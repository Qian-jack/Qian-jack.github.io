<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子罗曼 - 线下门店</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="site.js" defer></script>
</head>
<body data-page="stores">
  <div data-site-header></div>
  <main class="main">
    <section class="page-hero container">
      <h1 class="section-title">线下门店</h1>
      <p class="body-copy">在实体空间中沉浸体验极简主义的氛围精髓。</p>
    </section>

    <section class="section container" style="padding-top: 0;">
      <div class="store-grid">
        <article class="store-card"><img src="assets/figma/store_hangzhou.png" alt="杭州门店" /><h2>杭州</h2><p>杭州市上城区湖滨路xx号</p></article>
        <article class="store-card"><img src="assets/figma/store_shanghai.png" alt="上海门店" /><h2>上海</h2><p>上海市黄浦区南京东路xx号</p></article>
        <article class="store-card"><img src="assets/figma/store_beijing.png" alt="北京门店" /><h2>北京</h2><p>北京市朝阳区建国门外大街xx号</p></article>
        <article class="store-card"><img src="assets/figma/store_shenzhen.png" alt="深圳门店" /><h2>深圳</h2><p>深圳市南山区深南大道xx号</p></article>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
</body>
</html>
